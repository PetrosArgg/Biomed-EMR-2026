version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: biomed_mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: biomed_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/install.sql:/docker-entrypoint-initdb.d/1_install.sql
      - ./database/load.sql:/docker-entrypoint-initdb.d/2_load.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: biomed_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=biomed_db
      - DB_PORT=3306
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: biomed_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
